name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: delta-server-linux-amd64
            binary: delta-server

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: delta-server-linux-arm64
            binary: delta-server

          # Both macOS builds run on macos-latest (arm64).
          # The Intel target is cross-compiled via rustup target add.
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: delta-server-darwin-amd64
            binary: delta-server

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: delta-server-darwin-arm64
            binary: delta-server

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: delta-server-windows-amd64.exe
            binary: delta-server.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta-server -> target
          key: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OpenSSL headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cd delta-server && cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp delta-server/target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "delta-server/target/${{ matrix.target }}/release/${{ matrix.binary }}" `
                    "${{ matrix.artifact }}"

      - name: SHA-256 checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower() + `
          "  ${{ matrix.artifact }}" | Out-File "${{ matrix.artifact }}.sha256" -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Installation

            ```bash
            # The Go package auto-downloads the right binary on first use:
            go get github.com/ghazibendahmane/go-delta-rs/deltago

            # Or pre-install for Docker / CI:
            go run github.com/ghazibendahmane/go-delta-rs/cmd/setup@${{ github.ref_name }}
            ```

            ## Manual download

            | Platform | Binary |
            |---|---|
            | Linux x86_64 | `delta-server-linux-amd64` |
            | Linux arm64 | `delta-server-linux-arm64` |
            | macOS Intel | `delta-server-darwin-amd64` |
            | macOS Apple Silicon | `delta-server-darwin-arm64` |
            | Windows x86_64 | `delta-server-windows-amd64.exe` |

            Verify with the accompanying `.sha256` file:
            ```bash
            sha256sum -c delta-server-linux-amd64.sha256
            ```
