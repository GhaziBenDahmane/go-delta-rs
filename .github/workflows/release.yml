name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Build native binaries for each platform ─────────────────────────────────
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: delta-server-linux-amd64
            binary: delta-server

          # Linux arm64 — cross-compiled via `cross`
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: delta-server-linux-arm64
            binary: delta-server
            use_cross: true

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: delta-server-darwin-amd64
            binary: delta-server

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: delta-server-darwin-arm64
            binary: delta-server

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: delta-server-windows-amd64.exe
            binary: delta-server.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta-server -> target
          key: ${{ matrix.target }}

      # protoc is required by tonic_build in build.rs
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OpenSSL headers (Linux native)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross (Linux arm64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cd delta-server && cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cd delta-server && cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp delta-server/target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "delta-server/target/${{ matrix.target }}/release/${{ matrix.binary }}" `
                    "${{ matrix.artifact }}"

      - name: Generate SHA-256 checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Generate SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower() + `
          "  ${{ matrix.artifact }}" | Out-File "${{ matrix.artifact }}.sha256" -Encoding utf8

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # ── Create GitHub Release and attach all binaries ───────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Installation

            Download the binary for your platform from the assets below,
            make it executable, and point `SidecarOptions.BinaryPath` at it.

            ```bash
            # Linux amd64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/delta-server-linux-amd64 \
              -o delta-server && chmod +x delta-server

            # macOS arm64 (Apple Silicon)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/delta-server-darwin-arm64 \
              -o delta-server && chmod +x delta-server
            ```

            Verify integrity with the accompanying `.sha256` file:
            ```bash
            sha256sum -c delta-server-linux-amd64.sha256
            ```

            Or build from source:
            ```bash
            git clone https://github.com/${{ github.repository }}
            cd go-delta-rs/delta-server && cargo build --release
            ```
