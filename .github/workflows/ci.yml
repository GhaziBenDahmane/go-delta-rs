name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go unit tests (no sidecar binary needed) ────────────────────────────────
  test-go-unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - run: go test ./deltago/ -v -race

  # ── Rust build + Go integration tests ──────────────────────────────────────
  test-integration:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta-server -> target
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install OpenSSL headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Build sidecar
        run: cd delta-server && cargo build --release
      - name: Run integration tests
        run: go test ./deltago/ -tags integration -v -timeout 120s

  # ── Rust lints ──────────────────────────────────────────────────────────────
  lint-rust:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: delta-server -> target
      - uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Check formatting
        run: cd delta-server && cargo fmt --check
      - name: Clippy
        run: cd delta-server && cargo clippy -- -D warnings
